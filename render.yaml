services:
  - type: web
    name: maintenance-nlp-api
    runtime: python
    plan: free
    region: oregon
    branch: main
    # Corpus CSV is gitignored; the generator is fully seeded, so rebuilding it
    # here reproduces the exact corpus the embeddings index was built from.
    buildCommand: pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt && python data/synthetic_generator.py
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENAI_API_KEY
        sync: false   # set in Render dashboard — never committed to repo
