name: maintenance-nlp
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pandas>=2.0.0
  - numpy>=1.24.0
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - scikit-learn>=1.3.0
  - scipy>=1.11.0
  - jupyter
  - notebook
  - ipykernel
  - pip
  - pip:
      # NLP
      - nltk>=3.8.0
      - spacy>=3.7.0
      # Transformers + PEFT
      - transformers>=4.40.0
      - torch>=2.2.0
      - peft>=0.10.0
      - datasets>=2.19.0
      - evaluate>=0.4.0
      - accelerate>=0.30.0
      - bitsandbytes>=0.43.0          # QLoRA 4-bit — Linux/GPU only; skip on Mac
      # Clustering + similarity
      - bertopic>=0.16.0
      - sentence-transformers>=3.0.0
      - umap-learn>=0.5.0
      - hdbscan>=0.8.38
      # LLM ETL
      - openai>=1.30.0
      - python-dotenv>=1.0.0
      # API
      - fastapi>=0.110.0
      - uvicorn[standard]>=0.27.0
      - pydantic>=2.0.0
      - python-multipart>=0.0.9
      - joblib>=1.3.0
